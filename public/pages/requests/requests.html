<!-- public/pages/requests/requests.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DEXP Requests</title>

    <link rel="stylesheet" href="/css/core/reset.css" />
    <link rel="stylesheet" href="/css/core/base.css" />
  </head>

  <body>
    <div id="appHeader"></div>

    <main class="page-shell">
      <section class="page-section">
        <div class="page-title-row">
          <div>
            <h2>Requests</h2>
            <p>Create and track interdepartmental requests.</p>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="dexp-admin-card">
          <h3>Create Request</h3>

          <div class="form-grid">
            <label>
              RO Number
              <input id="requestRoNumberInput" type="text" />
            </label>

            <label>
              Tag Number
              <input id="requestTagNumberInput" type="text" />
            </label>

            <label>
              Notes
              <input
                id="requestMessageInput"
                type="text"
                placeholder="Optional notes..."
              />
            </label>
          </div>

          <div class="action-row">
            <button id="requestPickupButton" type="button">
              Request Pickup
            </button>

            <button id="requestBringToShopButton" type="button">
              Bring Vehicle to Shop
            </button>

            <button id="requestMoveToAnnexButton" type="button">
              Move Vehicle to Annex
            </button>
          </div>

          <p id="requestFormMessage" class="page-message"></p>
        </div>
      </section>

      <section class="page-section">
        <div class="dexp-admin-card">
          <div class="page-title-row">
            <div>
              <h3>Requests Tracker</h3>
              <p>Track request status without taking extra space.</p>
            </div>

            <div class="action-row">
              <button
                id="myRequestsToggleButton"
                type="button"
                class="small-button"
              >
                My Requests
              </button>

              <button
                id="allRequestsToggleButton"
                type="button"
                class="small-button secondary"
              >
                All Requests
              </button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Created</th>
                  <th>Type</th>
                  <th>RO</th>
                  <th>Tag</th>
                  <th>Target</th>
                  <th>Status</th>
                  <th>Opened By</th>
                  <th>Started By</th>
                  <th>Completed By</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody id="requestsTableBody">
                <tr>
                  <td colspan="10">Loading requests...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/js/core/app.js"></script>
    <script type="module" src="/pages/requests/requests-page.js?v=3"></script>
  </body>
</html>
