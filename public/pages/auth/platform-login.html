<!-- public/pages/auth/platform-login.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DEXP Platform Login</title>

    <link rel="stylesheet" href="/css/core/reset.css" />
    <link rel="stylesheet" href="/css/core/base.css" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/png" href="/assets/logo-v2.png" />

    <meta name="theme-color" content="#0b3d91" />
  </head>

  <body>
    <main
      class="app-shell"
      style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      "
    >
      <section
        class="tool-card"
        style="
          width: 100%;
          max-width: 420px;
          text-align: center;
          padding: 32px;
        "
      >
        <img
          src="/assets/logo-v2.png"
          alt="DEXP"
          style="
            width: 180px;
            max-width: 70%;
            margin-bottom: 18px;
          "
        />

        <h1>DEXP</h1>

        <p class="tool-help">
          Platform Administration
        </p>

        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
          "
        >
          <input
            id="platformEmailInput"
            type="email"
            placeholder="Platform Admin Email"
            style="
              width: 100%;
              padding: 10px;
            "
          />

          <input
            id="platformPasswordInput"
            type="password"
            placeholder="Password"
            style="
              width: 100%;
              padding: 10px;
            "
          />

          <button
            id="btn-platform-email-login"
            type="button"
          >
            Sign In
          </button>
        </div>

        <hr style="margin: 24px 0" />

        <button
          id="btn-google-login"
          type="button"
          style="width: 100%"
        >
          Sign In with Google
        </button>
      </section>
    </main>

    <script
      type="module"
      src="/js/pages/auth/platform-login-page.js?v=2"
    ></script>
  </body>
</html>
