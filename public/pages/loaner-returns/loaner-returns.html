<!-- public/pages/loaner-returns/loaner-returns.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Loaner Returns</title>

    <link rel="stylesheet" href="/css/core/reset.css" />
    <link rel="stylesheet" href="/css/core/base.css" />

    <link
      rel="stylesheet"
      href="/css/modules/loaners-shared.css?v=4"
    />

    <link
      rel="stylesheet"
      href="/css/modules/loaner-returns.css?v=2"
    />
  </head>

  <body>
    <div id="appHeader"></div>

    <main
      id="loanerReturnsPage"
      class="loaner-returns-shell"
    >
      <section class="page-section">
        <h1>Loaners</h1>

        <div class="subtabs">
          <a href="/pages/loaner-fleet/loaner-fleet.html">
            Fleet
          </a>

          <a
            href="/pages/loaner-returns/loaner-returns.html"
            class="active"
          >
            Returns
          </a>

          <a href="/pages/loaner-wash/loaner-wash.html">
            Wash Queue
          </a>
        </div>

        <div
          id="loanerCounts"
          class="loaner-counts"
        >
          <div class="loaner-count-card">
            <span class="loaner-count-label">
              Total
            </span>

            <strong id="loanerTotalCount">
              0
            </strong>
          </div>

          <div class="loaner-count-card">
            <span class="loaner-count-label">
              Out
            </span>

            <strong id="loanerOutCount">
              0
            </strong>
          </div>

          <div class="loaner-count-card">
            <span class="loaner-count-label">
              Available
            </span>

            <strong id="loanerAvailableCount">
              0
            </strong>
          </div>

          <div class="loaner-count-card">
            <span class="loaner-count-label">
              At Wash
            </span>

            <strong id="loanerAtWashCount">
              0
            </strong>
          </div>

          <div class="loaner-count-card">
            <span class="loaner-count-label">
              In Shop
            </span>

            <strong id="loanerInShopCount">
              0
            </strong>
          </div>
        </div>
      </section>

      <section class="page-section">
        <h2>Return Intake</h2>

        <div class="form-row">
          <button
            id="scanReturnBtn"
            type="button"
          >
            Scan VIN
          </button>

          <input
            id="manualVin"
            type="search"
            inputmode="text"
            enterkeyhint="search"
            autocomplete="off"
            autocapitalize="characters"
            placeholder="Enter full VIN, last 8, or last 6"
          />

          <button
            id="findReturnVinBtn"
            type="button"
            disabled
          >
            Find
          </button>
        </div>

        <video
          id="scannerVideo"
          autoplay
          playsinline
          muted
          style="display: none"
        ></video>

        <div
          id="scannerStatus"
          class="small-muted"
        ></div>

        <div
          class="form-row"
          style="margin-top: 10px"
        >
          <input
            id="vin"
            placeholder="VIN"
            readonly
          />

          <input
            id="year"
            placeholder="Year"
            readonly
          />

          <input
            id="model"
            placeholder="Model"
            readonly
          />
        </div>

        <div class="form-row">
          <input
            id="returnedAt"
            placeholder="Returned At"
            readonly
          />

          <input
            id="receivedBy"
            placeholder="Received By"
            readonly
          />

          <input
            id="mileage"
            type="number"
            inputmode="numeric"
            min="0"
            placeholder="Mileage"
          />

          <input
            id="fuelLevel"
            placeholder="Fuel Level"
          />
        </div>

        <div class="form-row">
          <textarea
            id="damageNotes"
            placeholder="Damage Notes"
          ></textarea>
        </div>

        <div class="form-row">
          <button
            id="saveReturnBtn"
            type="button"
            disabled
          >
            Save Return
          </button>

          <div
            id="returnMsg"
            class="small-muted"
          ></div>
        </div>
      </section>

      <section class="page-section">
        <h2>Return List</h2>

        <div
          class="table-wrap"
          id="returnTable"
        ></div>
      </section>
    </main>

    <script
      type="module"
      src="/js/modules/loaners/loaner-returns-page.js?v=7"
    ></script>
  </body>
</html>
