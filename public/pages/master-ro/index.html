<!-- public/pages/master-ro/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Master RO</title>

  <link rel="stylesheet" href="/css/core/base.css" />
</head>

<body>
  <main id="masterRoPage" class="page-shell full-page">

    <section class="page-card">

      <div class="page-title-row">
        <div>
          <h2>Master RO</h2>
          <p>All active repair orders for this dealer.</p>
        </div>

        <button id="createTestRoButton" type="button">
          Create Test RO
        </button>
      </div>

      <div class="toolbar-row">
        <input
          id="roSearchInput"
          type="search"
          placeholder="Search RO, tag, VIN, customer, vehicle, status, or location"
        />
      </div>

      <section class="table-wrap">
        <table class="data-table">
          <thead>
            <tr id="masterRoTableHead"></tr>
          </thead>

          <tbody id="roList"></tbody>
        </table>
      </section>

    </section>

  </main>

  <script type="module" src="/js/core/app.js"></script>
  <script type="module" src="/pages/master-ro/master-ro.js"></script>
</body>
</html>
